mutation ReplacePriorityPalette($fieldId: ID!) {
  updateProjectV2Field(input: {
    fieldId: $fieldId
    singleSelectOptions: [
      {
        name: "P0"
        color: RED
        description: "Urgente / bloqueante"
      }
      {
        name: "P1"
        color: ORANGE
        description: "Alta — sprint actual"
      }
      {
        name: "P2"
        color: BLUE
        description: "Media — siguiente o backlog cercano"
      }
      {
        name: "P3"
        color: GRAY
        description: "Baja — cuando sobre tiempo"
      }
    ]
  }) {
    projectV2Field {
      ... on ProjectV2SingleSelectField {
        id
        options { id name }
      }
    }
  }
}
