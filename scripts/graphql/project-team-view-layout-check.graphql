query TeamViewLayoutCheck($projectNumber: Int!) {
  viewer {
    projectV2(number: $projectNumber) {
      title
      views(first: 25) {
        nodes {
          number
          name
          layout
          groupByFields(first: 5) {
            nodes {
              __typename
              ... on ProjectV2SingleSelectField {
                name
              }
            }
          }
          verticalGroupByFields(first: 5) {
            nodes {
              __typename
              ... on ProjectV2SingleSelectField {
                name
              }
            }
          }
        }
      }
    }
  }
}
