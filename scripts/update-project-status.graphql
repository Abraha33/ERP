mutation ReplaceStatusOptions($fieldId: ID!) {
  updateProjectV2Field(input: {
    fieldId: $fieldId
    singleSelectOptions: [
      { name: "Backlog", color: GRAY, description: "Ideas y tareas futuras" },
      { name: "To Do", color: BLUE, description: "Sprint actual - tareas de estas 2 semanas" },
      { name: "In Progress", color: YELLOW, description: "REGLA: Solo 1 tarea aqui. Foco total." },
      { name: "Review/Testing", color: PURPLE, description: "Probar en celular o navegador" },
      { name: "Done", color: GREEN, description: "Completado" }
    ]
  }) {
    projectV2Field { ... on ProjectV2SingleSelectField { id options { id name } } }
  }
}
