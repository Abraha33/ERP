name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  erp-api:
    name: ERP API — lint, typecheck, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            erp-api/requirements.txt
            erp-api/requirements-dev.txt

      - name: ERP API — install dependencies
        run: |
          pip install -r erp-api/requirements.txt
          pip install -r erp-api/requirements-dev.txt

      - name: ERP API — compile check
        run: python -m compileall erp-api -q

      - name: Scraper — install & compile
        run: |
          pip install -r tools/scraper/requirements.txt
          python -m compileall tools/scraper -q

  db_migrations:
    name: DB — apply migrations on Postgres 16
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_schema
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ci_schema"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply Supabase-style migrations (stubs + SQL)
        env:
          PGPASSWORD: postgres
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGDATABASE: ci_schema
        run: bash scripts/ci/apply_supabase_migrations.sh

      - name: Schema snapshot (artifact)
        env:
          PGPASSWORD: postgres
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGDATABASE: ci_schema
        run: |
          pg_dump --schema-only --no-owner \
            -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" "$PGDATABASE" | tee ci_schema.sql

      - uses: actions/upload-artifact@v4
        with:
          name: postgres-schema
          path: ci_schema.sql
