name: Supabase Deploy

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - ".github/workflows/supabase-deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_db:
        description: "Apply DB migrations"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_functions:
        description: "Deploy Edge Functions"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  db_push:
    if: github.event_name == 'push' || inputs.deploy_db == 'true'
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify DB secret
        run: |
          if [ -z "${SUPABASE_DB_URL}" ]; then
            echo "Missing secret SUPABASE_DB_URL"
            echo "Create it in: Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Push migrations to Supabase
        run: supabase db push --db-url "${SUPABASE_DB_URL}" --include-all --yes

  functions_deploy:
    if: github.event_name == 'push' || inputs.deploy_functions == 'true'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify deploy secrets
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "Missing secret SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          PROJECT_REF="${SUPABASE_PROJECT_REF:-fwegtmgcuuyjryffkmxb}"
          echo "PROJECT_REF=${PROJECT_REF}" >> "$GITHUB_ENV"

      - name: Deploy all Edge Functions
        run: supabase functions deploy --project-ref "${PROJECT_REF}" --use-api --yes
