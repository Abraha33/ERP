name: Supabase Deploy

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - ".github/workflows/supabase-deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_db:
        description: "Apply DB migrations"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_functions:
        description: "Deploy Edge Functions"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  db_push:
    if: github.event_name == 'push' || inputs.deploy_db == 'true'
    runs-on: ubuntu-latest
    environment: SUPABASE_DEPLOY
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify DB URL
        run: |
          if [ -z "${SUPABASE_DB_URL}" ]; then
            echo "::error::Missing secret SUPABASE_DB_URL in environment SUPABASE_DEPLOY"
            exit 1
          fi
          echo "DB URL is set (pooler: $(echo "${SUPABASE_DB_URL}" | grep -o '@[^/]*' | head -1))"

      - name: Push migrations to Supabase
        run: supabase db push --db-url "${SUPABASE_DB_URL}" --include-all --yes

  functions_deploy:
    if: github.event_name == 'push' || inputs.deploy_functions == 'true'
    runs-on: ubuntu-latest
    environment: SUPABASE_DEPLOY
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify deploy secrets
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::Missing secret SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          # Extract ref from full URL if needed (e.g. https://fwegtmgcuuyjryffkmxb.supabase.co)
          RAW_REF="${SUPABASE_PROJECT_REF:-fwegtmgcuuyjryffkmxb}"
          PROJECT_REF=$(echo "$RAW_REF" | sed 's|https\?://||;s|\.supabase\.co.*||')
          echo "PROJECT_REF=${PROJECT_REF}" >> "$GITHUB_ENV"
          echo "Deploying to project ref: ${PROJECT_REF}"

      - name: Check for Edge Functions
        id: check_functions
        run: |
          if [ -z "$(ls -A supabase/functions/ 2>/dev/null | grep -v '^\.' | head -1)" ]; then
            echo "No Edge Functions found in supabase/functions/ — skipping deploy"
            echo "has_functions=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_functions=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy all Edge Functions
        if: steps.check_functions.outputs.has_functions == 'true'
        run: supabase functions deploy --project-ref "${PROJECT_REF}" --use-api --yes
