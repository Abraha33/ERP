name: Supabase Deploy

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - ".github/workflows/supabase-deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_db:
        description: "Apply DB migrations"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_functions:
        description: "Deploy Edge Functions"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  db_push:
    if: github.event_name == 'push' || inputs.deploy_db == 'true'
    runs-on: ubuntu-latest
    environment: SUPABASE_DEPLOY
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Normalize & verify DB URL
        id: normalize
        run: |
          RAW="${SUPABASE_DB_URL}"
          if [ -z "$RAW" ]; then
            echo "Missing secret SUPABASE_DB_URL in environment SUPABASE_DEPLOY"
            exit 1
          fi
          # Use awk to parse scheme://userinfo@host and strip brackets from password
          NORMALIZED=$(echo "$RAW" | awk -F'@' '{
            userinfo=substr($1, index($1,"://")+3)
            host=$2
            if (index(userinfo,":") > 0) {
              split(userinfo, parts, ":")
              user=parts[1]
              pass=parts[2]
            } else {
              user=userinfo
              pass=""
            }
            gsub(/^\[|\]$/, "", pass)
            # Always use postgres as user
            printf "postgresql://postgres:%s@%s", pass, host
          }')
          echo "SUPABASE_DB_URL_CLEAN=$NORMALIZED" >> "$GITHUB_ENV"
          echo "URL: $(echo "$NORMALIZED" | sed 's|:[^:@]*@|:***@|')"

      - name: Push migrations to Supabase
        run: supabase db push --db-url "${SUPABASE_DB_URL_CLEAN}" --include-all --yes

  functions_deploy:
    if: github.event_name == 'push' || inputs.deploy_functions == 'true'
    runs-on: ubuntu-latest
    environment: SUPABASE_DEPLOY
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify deploy secrets
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "Missing secret SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          # Extract ref from full URL if needed (e.g. https://fwegtmgcuuyjryffkmxb.supabase.co)
          RAW_REF="${SUPABASE_PROJECT_REF:-fwegtmgcuuyjryffkmxb}"
          PROJECT_REF=$(echo "$RAW_REF" | sed 's|https\?://||;s|\.supabase\.co.*||')
          echo "PROJECT_REF=${PROJECT_REF}" >> "$GITHUB_ENV"

      - name: Deploy all Edge Functions
        run: supabase functions deploy --project-ref "${PROJECT_REF}" --use-api --yes
