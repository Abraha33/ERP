name: Supabase Deploy

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - ".github/workflows/supabase-deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_db:
        description: "Apply DB migrations"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_functions:
        description: "Deploy Edge Functions"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  db_push:
    if: github.event_name == 'push' || inputs.deploy_db == 'true'
    runs-on: ubuntu-latest
    environment: SUPABASE_DEPLOY
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify & normalize DB URL
        run: |
          if [ -z "${SUPABASE_DB_URL}" ]; then
            echo "Missing secret SUPABASE_DB_URL"
            exit 1
          fi
            # Parse and normalize the DB URL using Python
          DB_URL=$(python3 - <<'PYEOF_INLINE'
import sys, re, os
url = os.environ.get("SUPABASE_DB_URL", "").strip()
after_scheme = url.split("://", 1)[1] if "://" in url else url
userinfo, host_part = after_scheme.rsplit("@", 1)
if ":" not in userinfo:
    m = re.search(r"\[([^\]]+)\]", userinfo)
    password = m.group(1) if m else userinfo.strip("[]")
else:
    user, password = userinfo.split(":", 1)
    password = password.strip("[]")
print(f"postgresql://postgres:{password}@{host_part}", end="")
PYEOF_INLINE
          )
          echo "DB_URL_NORMALIZED=$DB_URL" >> "$GITHUB_ENV"
          echo "URL format: $(echo "$DB_URL" | sed 's|:[^:@]*@|:***@|')"

      - name: Push migrations to Supabase
        run: supabase db push --db-url "${DB_URL_NORMALIZED}" --include-all --yes

  functions_deploy:
    if: github.event_name == 'push' || inputs.deploy_functions == 'true'
    runs-on: ubuntu-latest
    environment: SUPABASE_DEPLOY
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify deploy secrets
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "Missing secret SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          # Extract ref from full URL if needed (e.g. https://fwegtmgcuuyjryffkmxb.supabase.co)
          RAW_REF="${SUPABASE_PROJECT_REF:-fwegtmgcuuyjryffkmxb}"
          PROJECT_REF=$(echo "$RAW_REF" | sed 's|https\?://||;s|\.supabase\.co.*||')
          echo "PROJECT_REF=${PROJECT_REF}" >> "$GITHUB_ENV"

      - name: Deploy all Edge Functions
        run: supabase functions deploy --project-ref "${PROJECT_REF}" --use-api --yes
